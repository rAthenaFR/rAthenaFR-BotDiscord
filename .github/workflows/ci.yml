name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v6

      - name: Installer la toolchain Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Mettre en cache Cargo et target
        uses: Swatinem/rust-cache@v2
        env:
          NODE_OPTIONS: --no-deprecation

      - name: Vérifier le formatage
        run: cargo fmt --all -- --check

      - name: Vérifier le build
        run: cargo check

      - name: Exécuter clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Exécuter les tests
        run: cargo test --all-targets --all-features

  integration:
    name: Tests d'intégration base de données
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: rathena_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v6

      - name: Installer la toolchain Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Mettre en cache Cargo et target
        uses: Swatinem/rust-cache@v2
        env:
          NODE_OPTIONS: --no-deprecation

      - name: Exécuter les tests d'intégration
        env:
          RATHENAFR_TEST_DATABASE_URL: mysql://root:root@127.0.0.1:3306/rathena_test
        run: cargo test --all-features integration -- --test-threads=1
