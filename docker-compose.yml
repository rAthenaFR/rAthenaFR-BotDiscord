services:
  rathenafr-discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: rathenafr-discord-bot:local
    container_name: rathenafr-discord-bot
    env_file:
      - .env
    environment:
      RATHENAFR_DISCORD_BOT_ENV: /app/.env
    volumes:
      - ./.env:/app/.env:ro
    restart: unless-stopped
    read_only: true
    tmpfs:
      # Système de fichiers racine en lecture seule : /tmp doit rester
      # accessible en écriture pour le fichier de santé du HEALTHCHECK.
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - rathena-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  rathena-network:
    external: true
